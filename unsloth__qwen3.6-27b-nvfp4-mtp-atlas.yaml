recipe_version: '2'
model: unsloth/Qwen3.6-27B-NVFP4
runtime: atlas
max_nodes: 1
container: avarok/atlas-gb10:dev
metadata:
  description: "Qwen3.6-27B-NVFP4 on the Atlas :dev runtime. fp8 KV WITH calibration, SSM cache tuning, speculative decoding, hermes tool parser, 262144 context. ATLAS_KV_OVERCOMMIT set via env (it is an env var, not a CLI flag)."
  maintainer: avarok
  category: chat
  model_params: 27B
  model_dtype: fp8
  quantization: fp8
  kv_dtype: fp8
defaults:
  port: 8000
env:
  ATLAS_KV_OVERCOMMIT: '1'
command: |
  spark serve {model} \
    --port {port} \
    --host 0.0.0.0 \
    --max-seq-len 262144 \
    --max-batch-size 4 \
    --kv-cache-dtype fp8 \
    --fp8-kv-calibration-tokens 256 \
    --kv-high-precision-layers auto \
    --gpu-memory-utilization 0.90 \
    --enable-prefix-caching \
    --ssm-cache-slots 128 \
    --ssm-checkpoint-interval 16 \
    --speculative \
    --num-drafts 1 \
    --tool-call-parser hermes
