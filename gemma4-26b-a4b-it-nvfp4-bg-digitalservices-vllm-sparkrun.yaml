recipe_version: "2"

model: bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4
runtime: vllm
max_nodes: 1
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5

metadata:
  description: Gemma 4 26B A4B IT NVFP4 on single DGX Spark with vLLM
  model_params: 26B-A4B
  model_dtype: nvfp4

defaults:
  port: 8001
  host: 0.0.0.0
  tensor_parallel: 1
  pipeline_parallel: 1
  gpu_memory_utilization: 0.3
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 24
  served_model_name: gemma-4-26b-a4b-it-nvfp4
  reasoning_parser: gemma4
  tool_call_parser: gemma4
  quantization: modelopt
  dtype: auto
  kv_cache_dtype: fp8
  safetensors_load_strategy: lazy
  moe_backend: marlin
  attention_backend: flashinfer

command: |
  python3 -m pip install --upgrade --user transformers==5.10.1
  export PYTHONPATH="/tmp/.local/lib/python3.12/site-packages:${PYTHONPATH}"
  export VLLM_NVFP4_GEMM_BACKEND=marlin

  python3 -c "import transformers; print(transformers.__version__); print(transformers.__file__)"

  python3 - <<'PY'
  import shutil
  import urllib.request

  url = "https://huggingface.co/bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4/resolve/main/gemma4_patched.py"
  target = "/usr/local/lib/python3.12/dist-packages/vllm/model_executor/models/gemma4.py"

  urllib.request.urlretrieve(url, "/tmp/gemma4_patched.py")
  shutil.copyfile("/tmp/gemma4_patched.py", target)

  print(f"Patched {target}")
  PY

  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --pipeline-parallel-size {pipeline_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --quantization {quantization} \
    --dtype {dtype} \
    --kv-cache-dtype {kv_cache_dtype} \
    --reasoning-parser {reasoning_parser} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --attention-backend {attention_backend} \
    --enable-prefix-caching \
    --enable-prompt-tokens-details \
    --safetensors-load-strategy {safetensors_load_strategy} \
    --moe-backend {moe_backend} \
    --trust-remote-code
