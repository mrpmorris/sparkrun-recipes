# sparkrun recipe — Qwen3.6-35B-A3B-heretic NVFP4 + DFlash on NVIDIA DGX Spark
#
# Source: https://github.com/AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4-DFlash
# Validated production flags from the upstream README (2026-06-18 image).
#
# HARD REQUIREMENTS — DGX Spark (GB10 / sm_121a) ONLY. The container is built
# natively for sm_121a and will NOT run on Hopper (H100/H200), Ampere
# (A100/A40), or other Blackwell variants (B200/GB200). Needs NVIDIA driver
# >= 580.x, Docker >= 25.x with nvidia-container-toolkit, 128 GB unified
# memory, ~35 GB free disk.
#
# Weight freshness: re-pull the main model if downloaded before 2026-06-18
# (vision-tower tensor rename fix — older weights return garbage on image
# input) and the DFlash drafter if downloaded before 2026-04-19 (long-context
# cudaErrorIllegalAddress fix).

model: AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4
runtime: vllm
# Pinned tag == :latest at time of writing; rollback tag :2026-06-11-pr41703.
container: qwen36-dflash-sparkrun:local

# Single-node recipe: tuned for one GB10. Weights (~22 GB NVFP4) + drafter
# (~1 GB) fit comfortably in 128 GB unified memory at TP=1.
min_nodes: 1
max_nodes: 1

metadata:
  description: Qwen3.6-35B-A3B-heretic (NVFP4, multimodal) + DFlash speculative decoding — DGX Spark production recipe (~97 tok/s avg single-stream, ~740 tok/s aggregate @ c=64)
  maintainer: AEON-7 <https://github.com/AEON-7/Qwen3.6-35B-A3B-heretic-NVFP4-DFlash>
  model_params: 35B
  model_dtype: nvfp4
  model_vram: 22

defaults:
  port: 8000
  host: 0.0.0.0
  # For sparkrun's VRAM/node estimation only (not passed to vllm — the
  # upstream validated command has no -tp flag). Single GB10 node; do not raise.
  tensor_parallel: 1
  # 0.85 is validated for LLM-only serving on GB10 (safely under the 0.88
  # cap). Drop to <= 0.70 if co-locating ASR/TTS/embeddings on the same Spark.
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_seqs: 64
  # Keep at 16384: 65536 exceeds the image's compile-range ceiling (32768),
  # forcing eager-prefill fallback + heavy unified-memory pressure. 16384 is
  # throughput-neutral — chunked prefill preserves the full 256k context.
  max_num_batched_tokens: 16384
  # Three aliases, one backend: canonical / greedy-agentic (T=0) /
  # sampled-creative (T=0.7). Route by alias from your gateway.
  served_model_name: qwen36-35b-heretic qwen36-fast qwen36-deep
  # num_speculative_tokens=11 is optimal for this drafter — acceptance and
  # long-context fidelity drop past ~11 (15 wastes draft compute). Do NOT add
  # an attention_backend or kv-cache-dtype override for the drafter; the
  # non-causal DFlash drafter needs its default backend and BF16 KV. No
  # --mamba-block-size either — this 8-layer drafter is all-full-attention.
  # sparkrun pre-syncs the drafter to target hosts because this JSON has a
  # top-level "model" field.
  speculative_config: '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 11}'
  limit_mm_per_prompt: '{"image": 4, "video": 2}'

# The image's ENTRYPOINT is /bin/bash; sparkrun executes this command inside
# the container, so no entrypoint override is needed (a raw `docker run`
# would need `--entrypoint vllm`).
command: |
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} --port {port} \
    --quantization compressed-tensors \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --trust-remote-code \
    --limit-mm-per-prompt '{limit_mm_per_prompt}' \
    --enable-auto-tool-choice --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --attention-backend flash_attn \
    --speculative-config '{speculative_config}'

# Long-context draft acceptance holds (42-58% at 32k), so benchmark deep
# contexts too. First boot takes ~10-12 min (NVFP4 GEMM autotune + CUDA-graph
# capture); restarts ~3-5 min with a persisted vLLM cache.
benchmark:
  framework: llama-benchy
  pp: [2048]
  depth: [0, 16384, 32768]
  prefix_caching: true
