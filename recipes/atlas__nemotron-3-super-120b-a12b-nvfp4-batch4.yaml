recipe_version: '2'
model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
runtime: atlas
max_nodes: 1
container: avarok/atlas-gb10:latest
metadata:
  description: "Nemotron-3-Super-120B (A12B MoE) NVFP4 \u2014 NVIDIA's hybrid Mamba-2\
    \ +\nMoE + Attention model on a single GB10. Single-node configuration\nfrom the\
    \ Atlas alpha-2.7 release announcement.\n"
  maintainer: avarok
  category: agent
  model_params: 120B
  model_dtype: nvfp4
  quantization: nvfp4
  kv_dtype: fp8
  note: "pmorris variant of @atlas/nemotron-3-super-120b-a12b-nvfp4: max_batch_size 8->4.
    At batch-8 the SSM state pool + scratch (22.86 GB) overflows the 121 GB GB10 after the
    74.78 GB weight load, so the stock recipe OOMs building inference buffers. batch-4 halves
    the SSM slots and fits. NOT directly comparable to batch-8 throughput numbers."
defaults:
  port: 8888
  host: 0.0.0.0
  max_model_len: 65536
  kv_cache_dtype: fp8
  kv_high_precision_layers: auto
  gpu_memory_utilization: 0.92
  scheduling_policy: slai
  tool_call_parser: qwen3_coder
  ssm_cache_slots: 0
  max_batch_size: 4  # 8 -> 4: fit SSM buffers on single GB10 (see note)
  speculative: true
