# Model:
# https://huggingface.co/AEON-7/Ornith-1.0-35B-AEON-Ultimate-Uncensored-NVFP4
#
# Ornith-1.0-35B (deepreinforce-ai) is a light RL post-train of Qwen3.6-35B-A3B,
# so the z-lab Qwen3.6-35B-A3B DFlash drafter is compatible (per the vendor's
# QUICKSTART_DGX_SPARK.md in the repo, which this recipe follows).
#
# DFlash drafter:
# https://huggingface.co/z-lab/Qwen3.6-35B-A3B-DFlash

recipe_version: '2'

model: AEON-7/Ornith-1.0-35B-AEON-Ultimate-Uncensored-NVFP4

runtime: vllm
builder: eugr
container: ghcr.io/aeon-7/aeon-vllm-ultimate:latest

# The AEON image sets ENTRYPOINT ["/bin/bash"]. sparkrun launches the serve
# command via `bash -c <cmd>`, so that entrypoint must be cleared or docker
# runs `/bin/bash bash -c ...`, which fails with exit 126
# ("cannot execute binary file"). Empty string clears the image ENTRYPOINT.
executor_config:
  entrypoint: ""

min_nodes: 1
max_nodes: 1

metadata:
  description: "Ornith-1.0-35B AEON Ultimate Uncensored - NVFP4 compressed-tensors, Qwen3.6-35B-A3B base MoE, DFlash spec-decode, 256K context, multimodal"
  model_params: 35B-A3B
  model_dtype: nvfp4

defaults:
  host: 0.0.0.0
  port: 8000

  served_model_name: AEON-7/Ornith-1.0-35B-AEON-Ultimate-Uncensored-NVFP4

  tensor_parallel: 1
  pipeline_parallel: 1

  # Vendor's validated-stable Spark values: 0.6 gpu-mem with DFlash on (its
  # per-seq draft/verify buffers are NOT fully counted in this budget), and
  # max_num_seqs 16 is a HARD cap — 32-64 exhausts the unified pool and
  # hard-crashes the box (NVRM NV_ERR_NO_MEMORY). For higher batch throughput
  # disable DFlash instead of raising max_num_seqs.
  gpu_memory_utilization: 0.6
  max_model_len: 262144
  max_num_seqs: 16
  max_num_batched_tokens: 16384

  # NVFP4 checkpoint is packed as compressed-tensors (nvfp4-pack-quantized).
  quantization: compressed-tensors
  attention_backend: flash_attn

  # Precision for the GatedDeltaNet (SSM) recurrent state.
  mamba_cache_dtype: float32

  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder

  # DFlash speculative decoding with the external drafter (pulled from HF).
  # Drafter pinned to the pre-2026-06-19 revision: the z-lab "Modal retrain"
  # doubled the drafter KV page size (6 layers / sliding-window / 8 KV heads
  # x 128), which vllm cannot unify with the hybrid GDN target's fixed-size
  # mamba pages (asserts in unify_kv_cache_spec_page_size on both AEON
  # images). The pinned 8-layer all-full-attention drafter page-matches the
  # target exactly. See aeon-7__qwen3.6-35b-a3b-heretic-nvfp4-dflash-vllm.yaml.
  # num_speculative_tokens 6 per the vendor quickstart (single-stream optimum
  # for Ornith; acceptance drops beyond 6).
  speculative_config: '{"method":"dflash","model":"z-lab/Qwen3.6-35B-A3B-DFlash","revision":"42d3b34d588423cdae7ba8f53a8cf7789346a719","num_speculative_tokens":6}'
  # Vendor-recommended sampling. Reasoning model: replies open with <think>.
  generation_config: '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":0.0,"repetition_penalty":1.0}'

env:
  VLLM_TARGET_DEVICE: cuda
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: sm_121a
  VLLM_USE_FLASHINFER_SAMPLER: "1"
  NVIDIA_FORWARD_COMPAT: "1"
  ENABLE_NVFP4_SM100: "0"
  VLLM_TEST_FORCE_FP8_MARLIN: "1"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  HF_TOKEN: "${HF_TOKEN}"

command: |
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --trust-remote-code \
    --quantization {quantization} \
    --attention-backend {attention_backend} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --mamba-cache-dtype {mamba_cache_dtype} \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --limit-mm-per-prompt '{"image":4,"video":2}' \
    --mm-encoder-tp-mode data \
    --speculative-config '{speculative_config}' \
    --reasoning-parser {reasoning_parser} \
    --override-generation-config '{generation_config}' \
    --tool-call-parser {tool_call_parser} \
    --enable-auto-tool-choice

# Pre-distribute the DFlash drafter at the pinned pre-retrain revision so a
# virgin machine caches the correct 8-layer full-attention drafter during the
# distribution phase. sparkrun auto-adds the drafter from speculative_config
# but drops the revision (fetches main = the broken 6-layer retrain), and it
# serves with HF_HUB_OFFLINE=1, so without this it fails offline. A custom
# distribution_config replaces the auto default, so {model}/{container} are
# re-listed here. add_model dedups by name, so the auto-add is skipped and this
# pinned revision wins.
distribution_config:
  models:
    entries:
      - name: "{model}"
      - name: z-lab/Qwen3.6-35B-A3B-DFlash
        revision: 42d3b34d588423cdae7ba8f53a8cf7789346a719
  containers:
    entries:
      - name: "{container}"
