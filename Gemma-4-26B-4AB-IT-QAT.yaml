recipe_version: '2'

model: unsloth/gemma-4-26B-A4B-it-qat-q4_0-unquantized

runtime: vllm
builder: eugr
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly:latest

min_nodes: 1
max_nodes: 1

metadata:
  description: "Gemma 4 26B A4B IT QAT Q4_0 Unsloth - max practical"

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  pipeline_parallel: 1
  gpu_memory_utilization: 0.95
  max_model_len: 262144
  max_num_batched_tokens: 8192
  max_num_seqs: 24

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --served-model-name gemma-4-26b-a4b-it-qat \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser gemma4 \
    --reasoning-parser gemma4 \
    --generation-config vllm \
    --override-generation-config '{"temperature":1.0,"top_k":64,"top_p":1.0,"min_p":0.1,"repetition_penalty":1.0}' \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --safetensors-load-strategy prefetch
