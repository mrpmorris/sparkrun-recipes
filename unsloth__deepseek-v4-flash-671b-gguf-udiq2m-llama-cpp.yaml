recipe_version: '2'
model: unsloth/DeepSeek-V4-Flash-GGUF:UD-IQ2_M
runtime: llama-cpp
container: scitrera/dgx-spark-llama-cpp:b9898-cu131
min_nodes: 1
max_nodes: 1
metadata:
  tokenizer: deepseek-ai/DeepSeek-V4-Flash
  description: "DeepSeek-V4-Flash 671B, unsloth UD-IQ2_M GGUF (90.9 GB, fits one GB10). Served on llama.cpp llama-server. vLLM in the spark-arena container has no GGUF support, so llama-cpp is the runtime that natively loads the unsloth ...-GGUF:TAG quant."
  maintainer: pmorris
  category: chat
  model_params: 671B
  model_dtype: iq2_m
  quantization: gguf
defaults:
  port: 8000
  host: 0.0.0.0
  max_model_len: 32768
  n_gpu_layers: 99
command: |
  llama-server \
      -hf {model} \
      --host {host} \
      --port {port} \
      --n-gpu-layers {n_gpu_layers} \
      --ctx-size {max_model_len} \
      --flash-attn on \
      --jinja \
      --no-webui \
      --no-mmap
