recipe_version: "2"

model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
runtime: vllm
max_nodes: 1
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5

metadata:
  description: NVIDIA Nemotron 3 Super 120B A12B NVFP4 on single DGX Spark with vLLM
  model_params: 120B
  active_params: 12B
  model_dtype: nvfp4
  kv_dtype: fp8

env:
  HF_TOKEN: "${HF_TOKEN}"
  VLLM_NVFP4_GEMM_BACKEND: marlin
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_FLASHINFER_ALLREDUCE_BACKEND: trtllm
  VLLM_USE_FLASHINFER_MOE_FP4: "0"

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  pipeline_parallel: 1
  data_parallel: 1
  gpu_memory_utilization: 0.90
  max_model_len: 1000000
  max_num_seqs: 4
  served_model_name: nvidia/nemotron-3-super
  kv_cache_dtype: fp8
  moe_backend: marlin
  mamba_ssm_cache_dtype: float16
  quantization: fp4
  speculative_config: '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  reasoning_parser_url: https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4/raw/main/super_v3_reasoning_parser.py
  reasoning_parser_path: /tmp/super_v3_reasoning_parser.py
  reasoning_parser: super_v3
  tool_call_parser: qwen3_coder

command: |
  python3 -c "from urllib.request import urlretrieve; urlretrieve('{reasoning_parser_url}', '{reasoning_parser_path}')" && \
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --async-scheduling \
    --dtype auto \
    --kv-cache-dtype {kv_cache_dtype} \
    --tensor-parallel-size {tensor_parallel} \
    --pipeline-parallel-size {pipeline_parallel} \
    --data-parallel-size {data_parallel} \
    --trust-remote-code \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-chunked-prefill \
    --max-num-seqs {max_num_seqs} \
    --max-model-len {max_model_len} \
    --moe-backend {moe_backend} \
    --mamba-ssm-cache-dtype {mamba_ssm_cache_dtype} \
    --quantization {quantization} \
    --speculative-config '{speculative_config}' \
    --reasoning-parser-plugin {reasoning_parser_path} \
    --reasoning-parser {reasoning_parser} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser}
