recipe_version: '2'

model: Qwen/Qwen3.6-35B-A3B-FP8

runtime: vllm
builder: eugr
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly:latest

min_nodes: 1
max_nodes: 1

metadata:
  description: "Qwen3.6-35B-A3B-FP8 - native FP8 format"

mods:
- mods/fix-qwen3-coder-next
- mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  pipeline_parallel: 1
  gpu_memory_utilization: 0.9
  max_model_len: 262144
  max_num_batched_tokens: 16384
  max_num_seqs: 16
  load_format: instanttensor
  kv_cache_dtype: fp8
  attention_backend: flashinfer
  tool_call_parser: qwen3_coder
  reasoning_parser: qwen3
  speculative_config: '{"method": "mtp", "num_speculative_tokens": 3}'
  generation_config: '{"temperature":0.6,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.5,"repetition_penalty":1.0}'

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'

command: |
  vllm serve {model} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --reasoning-parser {reasoning_parser} \
    --override-generation-config '{generation_config}' \
    --kv-cache-dtype {kv_cache_dtype} \
    --load-format {load_format} \
    --attention-backend {attention_backend} \
    --speculative-config '{speculative_config}' \
    -tp {tensor_parallel} \
    -pp {pipeline_parallel} \
    --max-num-seqs {max_num_seqs}
