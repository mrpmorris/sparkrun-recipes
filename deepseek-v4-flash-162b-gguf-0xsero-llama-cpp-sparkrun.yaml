recipe_version: "2"

model: 0xSero/DeepSeek-V4-Flash-162B-GGUF
runtime: llama-cpp
max_nodes: 1
container: scitrera/dgx-spark-llama-cpp:b8076-cu131

metadata:
  description: 0xSero DeepSeek V4 Flash 162B GGUF on single DGX Spark with llama.cpp
  model_params: 162B
  model_dtype: gguf

defaults:
  port: 8000
  host: 0.0.0.0
  n_gpu_layers: 99
  max_model_len: 8192
  served_model_name: deepseek-v4-flash-162b-gguf

command: |
  llama-server \
    -hf {model} \
    --host {host} \
    --port {port} \
    --alias {served_model_name} \
    --n-gpu-layers {n_gpu_layers} \
    --ctx-size {max_model_len} \
    --flash-attn on \
    --jinja \
    --no-webui
