recipe_version: "2"

model: RedHatAI/Qwen3.6-35B-A3B-NVFP4
runtime: vllm
max_nodes: 1
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5

metadata:
  description: RedHatAI Qwen3.6 35B A3B NVFP4 on single DGX Spark with vLLM
  model_params: 35B
  model_dtype: nvfp4

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.9
  max_model_len: 32768
  served_model_name: qwen3.6-35b-a3b-nvfp4
  moe_backend: flashinfer_cutlass
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder
  speculative_config: '{"method":"qwen3_next_mtp","num_speculative_tokens":4}'
  safetensors_load_strategy: lazy

command: |
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --reasoning-parser {reasoning_parser} \
    --moe-backend {moe_backend} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --speculative-config '{speculative_config}' \
    --safetensors-load-strategy {safetensors_load_strategy} \
    --trust-remote-code
