recipe_version: "2"
model: unsloth/Qwen3.6-27B-NVFP4
runtime: atlas
container: avarok/atlas-gb10:dev
max_nodes: 1

metadata:
  description: |
    Qwen3.6-27B (unsloth NVFP4) — the validated agentic + tool-calling
    golden config on a single GB10. This is the highest-quality 27B
    recipe on BFCL and the first to reach llama.cpp TTFT parity on deep
    multi-turn agentic work while keeping the Atlas decode win.

    Gate-verified 2026-07-10 (full 1007-turn agentic e2e + BFCL ST-995,
    seed 42, vs llama.cpp cfff1fc Q4_K_M on the identical harness):
      BFCL ST-995        87.44 overall / 89.59 normalized (llama 88.53)
      warm TTFT          median 1403 ms (llama 1431) / avg 1724 (1666)
      TPOT               58.2 ms (llama 85.8) — 1.47x decode
      wall, same work    5902 s vs llama 8171 s — 1.38x end-to-end
      warm SSM replay    857/862 restores replay exactly 16 tokens
      completions        1007/1007, zero failures

    REQUIRES the SSM snapshot-eviction fix (atlas#287, merged
    2026-07-10): before it, deep conversations froze the warm-restore
    anchor and replayed up to 18.6k tokens/turn through the GDN layers
    (TTFT tail to 40 s). Use avarok/atlas-gb10:dev built on/after
    2026-07-11 (or any build containing #287). :latest lags — check the
    tag date before substituting.

    Config notes:
    - ssm_cache_slots 128 / ssm_checkpoint_interval 32 is the validated
      pair; with #287 the interval no longer matters for the warm tail
      (16-token replay at interval 0 and 32 alike) — 32 keeps intra-turn
      checkpoints for branchy/partial-prefix reuse.
    - qwen3_coder parser with disable_tool_grammar true is mandatory for
      parallel tool calls (grammar constraining collapses them).
    - bf16 KV at 32k context: this checkpoint's quality gates were run
      with bf16 KV; fp8 KV frees memory for longer contexts but was not
      part of this validation.
    - Checkpoint choice is workload-split: unsloth (this recipe) wins
      BFCL/tool-calling; nvidia/Qwen3.6-27B-NVFP4 wins raw agentic IoU
      and decode speed. Known remaining gap vs llama.cpp: TTFT p90
      (+19%, mid-size suffix prefill throughput — tracked in atlas#295);
      agentic IoU 0.62 vs llama 0.63-0.65 is a model/parser quality cap,
      not config-fixable.
  maintainer: avarok
  category: agent
  model_params: 27B
  model_dtype: nvfp4
  quantization: nvfp4
  kv_dtype: bf16

defaults:
  port: 8000
  host: 0.0.0.0
  max_model_len: 32768
  max_batch_size: 1
  kv_cache_dtype: bf16
  gpu_memory_utilization: 0.85
  enable_prefix_caching: true
  ssm_cache_slots: 128
  ssm_checkpoint_interval: 32
  speculative: true
  mtp_quantization: bf16
  tool_call_parser: qwen3_coder
  disable_tool_grammar: true
  disable_thinking: true
