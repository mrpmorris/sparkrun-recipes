recipe_version: "2"

model: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4

runtime: vllm

max_nodes: 1

container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5

metadata:
 description: NVIDIA Nemotron 3 Nano Omni 30B A3B Reasoning NVFP4 on single DGX Spark with vLLM
 model_params: 30B-A3B
 model_dtype: nvfp4

defaults:
 port: 8002
 host: 0.0.0.0
 tensor_parallel: 1
 gpu_memory_utilization: 0.3
 max_model_len: 262144
 max_num_seqs: 4
 served_model_name: nemotron-3-nano-omni-30b-a3b-reasoning-nvfp4
 quantization: modelopt
 dtype: auto
 kv_cache_dtype: fp8
 safetensors_load_strategy: lazy

command: |
 vllm serve {model} \
 --served-model-name {served_model_name} \
 --host {host} \
 --port {port} \
 --tensor-parallel-size {tensor_parallel} \
 --gpu-memory-utilization {gpu_memory_utilization} \
 --max-model-len {max_model_len} \
 --max-num-seqs {max_num_seqs} \
 --quantization {quantization} \
 --dtype {dtype} \
 --kv-cache-dtype {kv_cache_dtype} \
 --safetensors-load-strategy {safetensors_load_strategy} \
 --enable-auto-tool-choice \
 --tool-call-parser qwen3_coder \
 --trust-remote-code
