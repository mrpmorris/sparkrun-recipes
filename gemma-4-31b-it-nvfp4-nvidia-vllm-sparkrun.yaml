recipe_version: "2"

model: nvidia/Gemma-4-31B-IT-NVFP4
runtime: vllm
max_nodes: 1
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5

metadata:
  description: NVIDIA Gemma 4 31B IT NVFP4 on single DGX Spark with vLLM
  model_params: 30.7B
  model_dtype: nvfp4

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 32768
  served_model_name: gemma-4-31b-it-nvfp4
  quantization: modelopt
  reasoning_parser: gemma4
  tool_call_parser: gemma4
  chat_template: examples/tool_chat_template_gemma4.jinja
  safetensors_load_strategy: lazy

command: |
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --quantization {quantization} \
    --reasoning-parser {reasoning_parser} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --chat-template {chat_template} \
    --safetensors-load-strategy {safetensors_load_strategy} \
    --trust-remote-code
