recipe_version: "2"

model: RedHatAI/Qwen3-Next-80B-A3B-Thinking-NVFP4
runtime: vllm
max_nodes: 1
container: ghcr.io/spark-arena/dgx-vllm-eugr-nightly-tf5:latest

metadata:
  description: RedHatAI Qwen3-Next 80B A3B Thinking NVFP4 on single DGX Spark with vLLM
  model_params: 80B
  active_params: 3B
  model_dtype: nvfp4

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 32768
  served_model_name: qwen3-next-80b-a3b-thinking-nvfp4
  moe_backend: flashinfer_b12x
  tool_call_parser: hermes
  safetensors_load_strategy: lazy

command: |
  vllm serve {model} \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --tokenizer-mode auto \
    --moe-backend {moe_backend} \
    --enable-auto-tool-choice \
    --tool-call-parser {tool_call_parser} \
    --no-enable-chunked-prefill \
    --safetensors-load-strategy {safetensors_load_strategy} \
    --trust-remote-code
